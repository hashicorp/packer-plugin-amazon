version: "2"

issues:
  # Maximum issues count per one linter. Set to 0 to disable. Default is 50.
  max-issues-per-linter: 0

  # Maximum count of issues with the same text. Set to 0 to disable. Default is 3.
  max-same-issues: 0

  # make issues output unique by line, default is true
  uniq-by-line: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unconvert
    - unused
  exclusions:
    rules:
      # Exclude gosimple bool check (gosimple merged into staticcheck in v2)
      - linters:
          - staticcheck
        text: "S(1002|1008|1021)"
      # Exclude failing staticchecks for now
      - linters:
          - staticcheck
        text: "SA(1006|1019|4006|4010|4017|5007|6005|9004):|ST1005|QF1"
      # Exclude lll issues for long lines with go:generate
      - linters:
          - lll
        source: "^//go:generate "
      - linters:
          - errcheck
        path: ".*_test.go"
      # Exclude unchecked Close() errors - common pattern in defers
      - linters:
          - errcheck
        source: "\\.Close\\(\\)"
    paths:
      - ".*\\.hcl2spec\\.go$"
  settings:
    errcheck:
      # report about not checking of errors in type assertions: `a := b.(MyStruct)`;
      # default is false: such cases aren't reported by default.
      check-type-assertions: false

      # report about assignment of errors to blank identifier: `num, _ := strconv.Atoi(numStr)`;
      # default is false: such cases aren't reported by default.
      check-blank: false

      exclude-functions:
        - "fmt:.*"
        - "io/ioutil:^Read.*"
        - "io:Close"

formatters:
  enable:
    - goimports

# options for analysis running
run:
  # default concurrency is a available CPU number
  concurrency: 4

  # timeout for analysis, e.g. 30s, 5m, default is 0 (disabled)
  timeout: 10m

  # exit code when at least one issue was found, default is 1
  issues-exit-code: 1

  # include test files or not, default is true
  tests: true

# output configuration options
output:
  formats:
    text:
      path: stdout